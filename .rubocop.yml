# Omakase Ruby styling for Rails
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

plugins:
  - rubocop-graphql
  - rubocop-rspec

AllCops:
  NewCops: enable

# GraphQL integration specs describe operations ("Mutation: publishPuzzle"),
# not classes — this is the idiomatic pattern for non-unit specs.
RSpec/DescribeClass:
  IgnoredMetadata:
    type:
      - graphql

# The OmniAuth constant lives under lib/omniauth/ (the gem's own directory name),
# not lib/omni_auth/, so specs mirror that path.
RSpec/SpecFilePathFormat:
  CustomTransform:
    OmniAuth: omniauth

# Dataloader sources (app/graphql/sources) are batch-loaders, not GraphQL
# types, so the type-description cop doesn't apply to them.
GraphQL/ObjectDescription:
  Exclude:
    - app/graphql/sources/**/*

# RelayClassicMutation wraps all arguments in an auto-generated input type,
# so mutations with ≤4 inline args are already following the extraction pattern.
# Mutations with 5+ args use explicit Types::InputObjects classes instead.
GraphQL/ExtractInputType:
  MaxArguments: 4

# Two fields that merely share a name prefix (e.g. published_at /
# published_version) don't warrant a wrapper type; extraction earns its keep
# only for larger clusters of genuinely related fields.
GraphQL/ExtractType:
  MaxFields: 3
